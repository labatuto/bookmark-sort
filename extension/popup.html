<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a2e;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.connected {
      background: #dcfce7;
      color: #166534;
    }
    .status.disconnected {
      background: #fef3c7;
      color: #92400e;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }
    .queue {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .queue-count {
      font-size: 24px;
      font-weight: 600;
      color: #6366f1;
    }
    .queue-label {
      font-size: 12px;
      color: #64748b;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    button.primary {
      background: #6366f1;
      color: white;
    }
    button.primary:hover {
      background: #4f46e5;
    }
    button.primary:disabled {
      background: #c7c7c7;
      cursor: not-allowed;
    }
    button.secondary {
      background: #f5f5f5;
      color: #64748b;
      margin-top: 8px;
    }
    button.secondary:hover {
      background: #e5e5e5;
    }
    .log {
      margin-top: 12px;
      padding: 8px;
      background: #f9f9f9;
      border-radius: 4px;
      font-size: 11px;
      color: #64748b;
      max-height: 100px;
      overflow-y: auto;
      display: none;
    }
    .log.visible {
      display: block;
    }
    .log-entry {
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <h1>
    <span style="font-size: 20px;">📑</span>
    Bookmark Sort
  </h1>

  <div id="status" class="status disconnected">Checking connection...</div>

  <div class="queue">
    <div class="queue-count" id="queueCount">-</div>
    <div class="queue-label">tweets to unbookmark</div>
  </div>

  <button id="unbookmarkBtn" class="primary" disabled>Start Unbookmarking</button>
  <button id="refreshBtn" class="secondary">Refresh Queue</button>

  <div id="log" class="log"></div>

  <script src="popup.js"></script>
</body>
</html>
